<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Web版抖音 Pro (高可用增强版) - 电脑适配版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #39d7e4;
            --primary-accent: #7a6cff;
            --secondary-accent: #ff79c6;
            --miku-glow: rgba(57, 215, 228, 0.45);
            --text-white: #ffffff;
            --text-gray: #cccccc;
            --pc-video-width: min(680px, calc(100vw - 60px));
            --pc-video-height: 100vh;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            overflow: hidden;
        }

        body {
            background:
                radial-gradient(circle at 15% 20%, rgba(57, 215, 228, 0.16), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(122, 108, 255, 0.18), transparent 42%),
                #05060d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-white);
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .app-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            background: linear-gradient(180deg, rgba(5,8,24,0.95), rgba(3,5,12,0.98));
            
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 响应式适配：PC端抖音网页版风格 */
        @media (min-width: 768px) {
            body {
                background: #000;
            }

            .app-container {
                background: #000;
                padding: 0;
                max-width: 100%;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .video-feed {
                width: var(--pc-video-width);
                height: 100vh;
                margin: 0 auto;
                border-radius: 0;
                box-shadow: none;
                overflow: hidden;
                scroll-snap-type: y mandatory;
                scroll-behavior: smooth;
                overscroll-behavior-y: contain;
            }

            .video-card {
                width: var(--pc-video-width);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #000;
                scroll-snap-align: start;
                scroll-snap-stop: always;
                position: relative;
                will-change: transform;
                transform: translateZ(0);
            }

            video {
                width: 100%;
                height: 100%;
                object-fit: contain;
                background: #000;
            }

            .top-nav {
                width: 100%;
                left: 0;
                transform: none;
                top: 0;
                background: linear-gradient(to bottom, rgba(10,18,42,0.85), transparent);
                padding: 18px 30px;
                border-radius: 0;
                justify-content: space-between;
            }

            .top-nav span { 
                margin: 0 22px; 
                font-size: 17px;
            }

            .nav-icon {
                padding: 10px 15px;
            }

            .nav-left {
                left: 20px;
            }

            .nav-right {
                right: 20px;
            }

            .sidebar {
                right: 18px;
                bottom: 150px;
            }

            .action-item {
                margin-bottom: 24px;
            }

            .action-item i {
                font-size: 36px;
            }

            .action-count {
                font-size: 14px;
                margin-top: 6px;
            }

            .avatar-img {
                width: 56px;
                height: 56px;
            }

            .follow-btn {
                width: 22px;
                height: 22px;
                font-size: 15px;
                bottom: -12px;
            }

            .disc-area {
                width: 56px;
                height: 56px;
            }

            .disc-area img {
                width: 32px;
                height: 32px;
            }

            .bottom-tabs {
                display: none;
            }

            .video-card .progress-container {
                bottom: 0;
                height: 4px;
            }

            .video-info {
                width: 72%;
                left: 20px;
                bottom: 60px;
            }

            .author {
                font-size: 17px;
                margin-bottom: 8px;
                font-weight: 600;
            }

            .desc {
                font-size: 14px;
                max-height: 50px;
                margin-bottom: 10px;
                line-height: 1.6;
            }

            .music {
                font-size: 14px;
            }

            .settings-modal .modal-content {
                width: 480px;
                max-width: 90%;
                padding: 28px;
            }

            .play-icon {
                width: 102px;
                height: 102px;
                font-size: 50px;
            }

            .unmute-hint {
                top: 85px;
            }

            .error-overlay .retry-btn {
                padding: 12px 28px;
                font-size: 15px;
            }
        }

        /* 移动端样式优化 */
        @media (max-width: 767px) {
            html, body {
                position: fixed;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            .app-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            .video-feed {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                width: 100%;
                overflow-y: scroll;
                overflow-x: hidden;
                scroll-snap-type: y mandatory;
                overscroll-behavior-y: none;
                scroll-behavior: smooth;
                -webkit-overflow-scrolling: touch;
                -webkit-user-select: none;
                user-select: none;
                touch-action: pan-y;
            }
            .video-feed::-webkit-scrollbar { display: none; }
            
            .video-card {
                height: 100vh;
                width: 100vw;
                min-height: 100vh;
                max-height: 100vh;
                scroll-snap-align: start;
                scroll-snap-stop: always; 
                position: relative;
                background: #000;
                overflow: hidden;
                will-change: transform;
                transform: translateZ(0);
                flex-shrink: 0;
            }
            
            video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                background: #000;
                display: block;
            }
            
            .bottom-tabs {
                display: flex;
            }
        }
        
        .top-nav {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .top-nav > * { pointer-events: auto; }
        .top-nav span { margin: 0 18px; color: rgba(255,255,255,0.6); cursor: pointer; padding-bottom: 4px; transition: all 0.3s; }
        .top-nav span.active {
            color: #eaffff;
            opacity: 1;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 2px;
            text-shadow: 0 0 10px var(--miku-glow);
        }
        .top-nav span:hover { color: #d7fbff; }
        
        .nav-icon { position: absolute; font-size: 20px; padding: 10px; cursor: pointer; }
        .nav-left { left: 10px; }
        .nav-right { right: 10px; }
        
        .video-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5) 40%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        /* 左右渐变模糊效果 */
        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, transparent 12%, transparent 88%, rgba(0,0,0,0.15) 100%);
        }
        
        /* 双击点赞动画 */
        .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 120px;
            color: #fe2c55;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            animation: doubleTapHeart 0.8s ease-out;
        }
        
        @keyframes doubleTapHeart {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        
        /* 个人主页样式 */
        .profile-page {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            overflow-y: auto;
        }
        
        .profile-page.show {
            display: block;
        }
        
        .profile-header {
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        
        .profile-avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 12px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .stat-label {
            font-size: 13px;
            color: #777;
            margin-top: 3px;
        }
        
        .profile-nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            border-bottom: 1px solid #222;
        }
        
        .profile-tab {
            color: #777;
            font-size: 14px;
            padding: 8px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .profile-tab.active {
            color: #fff;
            border-bottom-color: #fe2c55;
        }
        
        .profile-content {
            padding: 15px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        
        .video-grid-item {
            aspect-ratio: 9/16;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #111;
        }
        
        .video-grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-grid-item .likes-count {
            position: absolute;
            bottom: 8px;
            right: 8px;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 3px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        
        .video-grid-item .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .video-grid-item .delete-btn:hover {
            background: rgba(254,44,85,0.8);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .video-overlay > * { pointer-events: auto; }
        
        /* 侧边栏 */
        .sidebar {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .action-item:hover {
            transform: translateY(-3px);
        }
        .action-item i {
            font-size: 30px;
            color: white;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease, filter 0.3s ease;
        }
        .action-item:active i { transform: scale(0.85); }
        .action-item i.liked { 
            color: var(--primary-color); 
            filter: drop-shadow(0 0 8px rgba(254,44,85,0.5));
            animation: like-pulse 0.4s ease-out;
        }
        @keyframes like-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .action-item:hover i { transform: scale(1.15) rotate(-5deg); }
        .action-count {
            font-size: 12px;
            margin-top: 2px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            letter-spacing: 0.3px;
        }
        .avatar-box { position: relative; }
        .avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.95);
            object-fit: cover;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .avatar-img:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-color: #fff;
        }
        .follow-btn {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-accent));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: white;
            box-shadow: 0 4px 12px rgba(57, 215, 228, 0.42);
            transition: transform 0.25s ease, background 0.3s ease;
        }
        .follow-btn:hover {
            transform: translateX(-50%) scale(1.15);
            background: var(--primary-color);
        }
        
        /* 唱片动画 */
        .disc-area {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 50%;
            border: 8px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 5s linear infinite;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.05);
        }
        .disc-area.paused { animation-play-state: paused; }
        .disc-area img { 
            width: 28px; 
            height: 28px; 
            border-radius: 50%; 
            object-fit: cover;
        }
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
        
        /* 视频信息 */
        .video-info {
            position: absolute;
            left: 15px;
            z-index: 2;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        }
        .author { 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px;
        }
        .desc { 
            font-size: 13px; 
            line-height: 1.4; 
            margin-bottom: 8px; 
            max-height: 42px; 
            overflow: hidden; 
            opacity: 0.92; 
            letter-spacing: 0.3px;
        }
        .music { 
            display: flex; 
            align-items: center; 
            font-size: 13px; 
            opacity: 0.88; 
        }
        .music i { 
            margin-right: 5px; 
            animation: music-note 2s ease-in-out infinite;
        }
        @keyframes music-note {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .marquee { white-space: nowrap; overflow: hidden; width: 150px; }
        
        /* 播放状态图标 */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.45);
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.32), rgba(57, 215, 228, 0.28) 42%, rgba(122,108,255,0.2) 100%);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #ecffff;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            filter: drop-shadow(0 8px 20px rgba(57, 215, 228, 0.35));
            box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 24px rgba(57, 215, 228, 0.4);
            z-index: 15;
        }
        .play-icon i {
            transform: translateX(2px);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .video-card.paused .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .video-card.playing .play-icon { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
        
        /* 双击点赞 */
        .double-click-heart {
            position: absolute;
            color: var(--primary-color);
            font-size: 80px;
            transform: translate(-50%, -50%) rotate(-15deg);
            animation: heart-pop 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }
        @keyframes heart-pop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(-15deg); }
            40% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); }
            100% { transform: translate(-50%, -150%) scale(1.2) rotate(0deg); opacity: 0; }
        }
        
        /* 底部Tab */
        .bottom-tabs {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 55px;
            background: linear-gradient(to top, rgba(6,10,30,0.95), rgba(6,10,30,0.58));
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            padding: 0 10px;
            padding-bottom: 8px;
        }
        .tab-item { font-size: 13px; color: rgba(223,245,255,0.65); font-weight: 500; cursor: pointer; transition: all 0.3s; padding: 5px 10px; }
        .tab-item.active { color: #ecffff; text-shadow: 0 0 8px var(--miku-glow); }
        .tab-item:hover { color: rgba(255,255,255,0.9); }
        .tab-add-btn {
            width: 42px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-accent));
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .tab-add-btn::before, .tab-add-btn::after {
            content: ''; position: absolute; width: 3px; height: 100%; top: 0; border-radius: 3px;
        }
        .tab-add-btn::before { left: -4px; background: var(--primary-color); }
        .tab-add-btn::after { right: -4px; background: var(--secondary-accent); }
        .tab-add-btn i { color: #fff; font-size: 18px; font-weight: bold; position: relative; z-index: 2; }
        
        /* 进度条 */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.15);
            z-index: 4;
            overflow: hidden;
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-accent)); 
            width: 0%; 
            transition: width 0.1s linear; 
            border-radius: 2px;
        }
        
        /* 模态框样式 */
        .settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(8px);
        }
        .settings-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #1a1a1a;
            padding: 25px; border-radius: 16px; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .source-select-container { margin-bottom: 20px; }
        .source-select {
            width: 100%; padding: 14px; background: #2a2a2a;
            border: 1px solid #444; border-radius: 10px;
            color: var(--text-white); font-size: 14px; outline: none;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .source-select:focus { border-color: var(--primary-color); }
        .source-select option { background: #2a2a2a; color: var(--text-white); padding: 10px; }
        .btn-action {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
            transition: all 0.3s;
        }
        .btn-confirm { background: linear-gradient(135deg, var(--primary-color), var(--primary-accent)); color: white; }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(57, 215, 228, 0.45); }
        .btn-upload { background: #333; color: white; }
        .btn-upload:hover { background: #3d3d3d; }
        .btn-close {
            background: transparent; color: rgba(255,255,255,0.6); padding: 10px 30px;
            border-radius: 20px; font-size: 14px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .btn-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        /* Toast & Loading */
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 2000; display: none;
            font-size: 14px;

    async function fetchVideoWithTimeout(url, timeout = 8000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        
        try {
            const response = await fetch(url, {
                signal: controller.signal,
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                }
            });
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const text = await response.text();
            
            if (!text || text.trim().length === 0) {
                throw new Error('Empty response');
            }
            
            try {
                const data = JSON.parse(text);
                if (!data.url && !data.data) {
                    throw new Error('Invalid response structure');
                }
                return data;
            } catch (e) {
                console.warn('JSON parse failed:', e);
                return { url: text.trim() };
            }
        } catch (error) {
            clearTimeout(timeoutId);
            throw error;
        }
    }

    function setupVideoCard(card) {
        const video = card.querySelector('video');
        const playIcon = card.querySelector('.play-icon');
        const progressBar = card.querySelector('.progress-bar');
        
        if (!video) return;
        
        let lastTapTime = 0;
        let tapCount = 0;
        
        // 视频事件监听
        video.addEventListener('play', () => {
            card.classList.add('playing');
            card.classList.remove('paused');
            const disc = card.querySelector('.disc-area');
            if (disc) disc.classList.remove('paused');
        });
        
        video.addEventListener('pause', () => {
            card.classList.add('paused');
            card.classList.remove('playing');
            const disc = card.querySelector('.disc-area');
            if (disc) disc.classList.add('paused');
        });
        
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                if (progressBar) progressBar.style.width = percent + '%';
            }
        });
        
        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.pause();
        });
        
        video.addEventListener('error', (e) => {
            console.error('Video error:', e);
            const errorOverlay = document.createElement('div');
            errorOverlay.className = 'error-overlay show';
            errorOverlay.innerHTML = '<div style="color: #999;">视频加载失败</div><button class="retry-btn" onclick="location.reload()">重试</button>';
            card.appendChild(errorOverlay);
        });
        
        // 双击点赞
        card.addEventListener('dblclick', (e) => {
            if (e.target !== video) return;
            const heart = document.createElement('div');
            heart.className = 'double-click-heart';
            heart.innerHTML = '❤️';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            card.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        });
        
        // 单击暂停/播放
        video.addEventListener('click', (e) => {
            e.stopPropagation();
            if (video.paused) {
                video.play().catch(err => console.warn('Play failed:', err));
            } else {
                video.pause();
            }
        });
    }

    function toggleLike(element) {
        const icon = element.querySelector('i');
        icon.classList.toggle('liked');

        element.querySelector('.action-count').textContent = icon.classList.contains('liked') ? count + 1 : Math.max(0, count - 1);
    }

    function initializeIntersectionObserver() {
        observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                
                const video = entry.target.querySelector('video');
                if (!video) return;
                
                // 停止所有其他视频
                document.querySelectorAll('.video-card video').forEach(v => {
                    if (v !== video && !v.paused) {
                        v.pause();
                    }
                });
                
                // 播放当前视频
                if (video.paused) {
                    video.play().catch(err => console.warn('Auto play failed:', err));
                }
                
                // 预加载下一个视频
                if (document.querySelectorAll('.video-card').length - document.querySelectorAll('.video-card').indexOf(entry.target) < PRELOAD_OFFSET) {
                    loadVideos();
                }
            });
        }, { threshold: 0.8 });
    }

            document.getElementById('videoFeed').addEventListener('scroll', () => {
                const feed = document.getElementById('videoFeed');
                if (feed.scrollTop + feed.clientHeight > feed.scrollHeight - 500) {
                    loadVideos();
                }
            });
            
            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        } catch (error) {
            console.error('Init error:', error);
        }
    }

    function openSettings() {
        document.getElementById('settingsModal').classList.add('show');
    }

    function closeSettings() {
        document.getElementById('settingsModal').classList.remove('show');
    }

    function confirmSwitchSource() {
        const select = document.getElementById('videoSourceSelect');
        const url = select.value;
        const name = select.options[select.selectedIndex].textContent;
        
        if (!url) {
            alert('请选择视频源');
            return;
        }
        
        currentApiUrl = url;
        currentCategoryName = name;
        localStorage.setItem(STORAGE_KEY_URL, url);
        localStorage.setItem(STORAGE_KEY_NAME, name);
        
        document.getElementById('videoFeed').innerHTML = '';
        loadVideos();
        closeSettings();
        showToast('切换成功');
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    function showProfileTab() {
        document.getElementById('profilePage').classList.add('show');
        document.getElementById('videoFeed').style.display = 'none';
    }

    function showHomeTab() {
        document.getElementById('profilePage').classList.remove('show');
        document.getElementById('videoFeed').style.display = 'block';
    }

    function showLikedTab() {
        // 实现点赞视频显示逻辑
    }

    document.getElementById('jsonFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (Array.isArray(data)) {
                    data.forEach(item => {
                        if (item['分类名称'] && item['视频源API地址']) {
                            builtInVideoSources.push(item);
                        }
                    });
                    const select = document.getElementById('videoSourceSelect');
                    const option = document.createElement('option');
                    option.value = data[0]['视频源API地址'];
                    option.textContent = data[0]['分类名称'];
                    select.appendChild(option);
                    showToast('导入成功');
                }
            } catch (error) {
                showToast('导入失败：' + error.message);
            }
        };
        reader.readAsText(file);
    });

    // 应用启动
    window.addEventListener('load', initializeApp);
    
    // 防止意外卸载
    window.addEventListener('beforeunload', (e) => {
        if (hasUserInteracted) {
            e.preventDefault();
        }
    });

    // 用户交互标记
    document.addEventListener('click', () => {
        hasUserInteracted = true;
    });
</script>
</body>
</html>

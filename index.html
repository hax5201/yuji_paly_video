<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web版抖音 Pro (高可用增强版) - 电脑适配版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #39d7e4;
            --primary-accent: #7a6cff;
            --secondary-accent: #ff79c6;
            --miku-glow: rgba(57, 215, 228, 0.45);
            --text-white: #ffffff;
            --text-gray: #cccccc;
            --pc-video-width: min(680px, calc(100vw - 60px));
            --pc-video-height: 100vh;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background:
                radial-gradient(circle at 15% 20%, rgba(57, 215, 228, 0.16), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(122, 108, 255, 0.18), transparent 42%),
                #05060d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            background: linear-gradient(180deg, rgba(5,8,24,0.95), rgba(3,5,12,0.98));
            
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* 响应式适配：PC端抖音网页版风格 */
        @media (min-width: 768px) {
            body {
                background: #000;
            }

            .app-container {
                background: #000;
                padding: 0;
                max-width: 100%;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .video-feed {
                width: var(--pc-video-width);
                height: 100vh;
                margin: 0 auto;
                border-radius: 0;
                box-shadow: none;
                overflow: hidden;
                scroll-snap-type: y mandatory;
                scroll-behavior: smooth;
                overscroll-behavior-y: contain;
            }

            .video-card {
                width: var(--pc-video-width);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #000;
                scroll-snap-align: start;
                scroll-snap-stop: always;
                position: relative;
                will-change: transform;
                transform: translateZ(0);
            }

            video {
                width: 100%;
                height: 100%;
                object-fit: contain;
                background: #000;
            }

            .top-nav {
                width: 100%;
                left: 0;
                transform: none;
                top: 0;
                background: linear-gradient(to bottom, rgba(10,18,42,0.85), transparent);
                padding: 18px 30px;
                border-radius: 0;
                justify-content: space-between;
            }

            .top-nav span { 
                margin: 0 22px; 
                font-size: 17px;
            }

            .nav-icon {
                padding: 10px 15px;
            }

            .nav-left {
                left: 20px;
            }

            .nav-right {
                right: 20px;
            }

            .sidebar {
                right: 18px;
                bottom: 150px;
            }

            .action-item {
                margin-bottom: 24px;
            }

            .action-item i {
                font-size: 36px;
            }

            .action-count {
                font-size: 14px;
                margin-top: 6px;
            }

            .avatar-img {
                width: 56px;
                height: 56px;
            }

            .follow-btn {
                width: 22px;
                height: 22px;
                font-size: 15px;
                bottom: -12px;
            }

            .disc-area {
                width: 56px;
                height: 56px;
            }

            .disc-area img {
                width: 32px;
                height: 32px;
            }

            .bottom-tabs {
                display: none;
            }

            .video-card .progress-container {
                bottom: 0;
                height: 4px;
            }

            .video-info {
                width: 72%;
                left: 20px;
                bottom: 60px;
            }

            .author {
                font-size: 17px;
                margin-bottom: 8px;
                font-weight: 600;
            }

            .desc {
                font-size: 14px;
                max-height: 50px;
                margin-bottom: 10px;
                line-height: 1.6;
            }

            .music {
                font-size: 14px;
            }

            .settings-modal .modal-content {
                width: 480px;
                max-width: 90%;
                padding: 28px;
            }

            .play-icon {
                width: 102px;
                height: 102px;
                font-size: 50px;
            }

            .unmute-hint {
                top: 85px;
            }

            .error-overlay .retry-btn {
                padding: 12px 28px;
                font-size: 15px;
            }
        }

        /* 移动端样式保持原有逻辑 */
        @media (max-width: 767px) {
            .video-feed {
                height: 100%;
                width: 100%;
                overflow-y: scroll;
                scroll-snap-type: y mandatory;
                overscroll-behavior-y: none;
                scroll-behavior: smooth;
                -webkit-overflow-scrolling: touch;
            }
            .video-feed::-webkit-scrollbar { display: none; }
            .video-card {
                height: 100vh;
                width: 100vw;
                scroll-snap-align: start;
                scroll-snap-stop: always; 
                position: relative;
                background: #000;
                overflow: hidden;
                will-change: transform;
                transform: translateZ(0);
            }
            video {
                object-fit: cover;
            }
            .bottom-tabs {
                display: flex;
            }
        }
        
        .top-nav {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .top-nav > * { pointer-events: auto; }
        .top-nav span { margin: 0 18px; color: rgba(255,255,255,0.6); cursor: pointer; padding-bottom: 4px; transition: all 0.3s; }
        .top-nav span.active {
            color: #eaffff;
            opacity: 1;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 2px;
            text-shadow: 0 0 10px var(--miku-glow);
        }
        .top-nav span:hover { color: #d7fbff; }
        
        .nav-icon { position: absolute; font-size: 20px; padding: 10px; cursor: pointer; }
        .nav-left { left: 10px; }
        .nav-right { right: 10px; }
        
        .video-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5) 40%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        /* 左右渐变模糊效果 */
        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, transparent 12%, transparent 88%, rgba(0,0,0,0.15) 100%);
        }
        
        /* 双击点赞动画 */
        .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 120px;
            color: #fe2c55;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            animation: doubleTapHeart 0.8s ease-out;
        }
        
        @keyframes doubleTapHeart {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        
        /* 个人主页样式 */
        .profile-page {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            overflow-y: auto;
        }
        
        .profile-page.show {
            display: block;
        }
        
        .profile-header {
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        
        .profile-avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 12px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .stat-label {
            font-size: 13px;
            color: #777;
            margin-top: 3px;
        }
        
        .profile-nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            border-bottom: 1px solid #222;
        }
        
        .profile-tab {
            color: #777;
            font-size: 14px;
            padding: 8px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .profile-tab.active {
            color: #fff;
            border-bottom-color: #fe2c55;
        }
        
        .profile-content {
            padding: 15px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        
        .video-grid-item {
            aspect-ratio: 9/16;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #111;
        }
        
        .video-grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-grid-item .likes-count {
            position: absolute;
            bottom: 8px;
            right: 8px;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 3px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        
        .video-grid-item .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .video-grid-item .delete-btn:hover {
            background: rgba(254,44,85,0.8);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .video-overlay > * { pointer-events: auto; }
        
        /* 侧边栏 */
        .sidebar {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .action-item:hover {
            transform: translateY(-3px);
        }
        .action-item i {
            font-size: 30px;
            color: white;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease, filter 0.3s ease;
        }
        .action-item:active i { transform: scale(0.85); }
        .action-item i.liked { 
            color: var(--primary-color); 
            filter: drop-shadow(0 0 8px rgba(254,44,85,0.5));
            animation: like-pulse 0.4s ease-out;
        }
        @keyframes like-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .action-item:hover i { transform: scale(1.15) rotate(-5deg); }
        .action-count {
            font-size: 12px;
            margin-top: 2px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            letter-spacing: 0.3px;
        }
        .avatar-box { position: relative; }
        .avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.95);
            object-fit: cover;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .avatar-img:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-color: #fff;
        }
        .follow-btn {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-accent));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: white;
            box-shadow: 0 4px 12px rgba(57, 215, 228, 0.42);
            transition: transform 0.25s ease, background 0.3s ease;
        }
        .follow-btn:hover {
            transform: translateX(-50%) scale(1.15);
            background: var(--primary-color);
        }
        
        /* 唱片动画 */
        .disc-area {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 50%;
            border: 8px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 5s linear infinite;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.05);
        }
        .disc-area.paused { animation-play-state: paused; }
        .disc-area img { 
            width: 28px; 
            height: 28px; 
            border-radius: 50%; 
            object-fit: cover;
        }
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
        
        /* 视频信息 */
        .video-info {
            position: absolute;
            left: 15px;
            z-index: 2;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        }
        .author { 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px;
        }
        .desc { 
            font-size: 13px; 
            line-height: 1.4; 
            margin-bottom: 8px; 
            max-height: 42px; 
            overflow: hidden; 
            opacity: 0.92; 
            letter-spacing: 0.3px;
        }
        .music { 
            display: flex; 
            align-items: center; 
            font-size: 13px; 
            opacity: 0.88; 
        }
        .music i { 
            margin-right: 5px; 
            animation: music-note 2s ease-in-out infinite;
        }
        @keyframes music-note {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .marquee { white-space: nowrap; overflow: hidden; width: 150px; }
        
        /* 播放状态图标 */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.45);
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.32), rgba(57, 215, 228, 0.28) 42%, rgba(122,108,255,0.2) 100%);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #ecffff;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            filter: drop-shadow(0 8px 20px rgba(57, 215, 228, 0.35));
            box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 24px rgba(57, 215, 228, 0.4);
            z-index: 15;
        }
        .play-icon i {
            transform: translateX(2px);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .video-card.paused .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .video-card.playing .play-icon { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
        
        /* 双击点赞 */
        .double-click-heart {
            position: absolute;
            color: var(--primary-color);
            font-size: 80px;
            transform: translate(-50%, -50%) rotate(-15deg);
            animation: heart-pop 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }
        @keyframes heart-pop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(-15deg); }
            40% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); }
            100% { transform: translate(-50%, -150%) scale(1.2) rotate(0deg); opacity: 0; }
        }
        
        /* 底部Tab */
        .bottom-tabs {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 55px;
            background: linear-gradient(to top, rgba(6,10,30,0.95), rgba(6,10,30,0.58));
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            padding: 0 10px;
            padding-bottom: 8px;
        }
        .tab-item { font-size: 13px; color: rgba(223,245,255,0.65); font-weight: 500; cursor: pointer; transition: all 0.3s; padding: 5px 10px; }
        .tab-item.active { color: #ecffff; text-shadow: 0 0 8px var(--miku-glow); }
        .tab-item:hover { color: rgba(255,255,255,0.9); }
        .tab-add-btn {
            width: 42px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-accent));
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .tab-add-btn::before, .tab-add-btn::after {
            content: ''; position: absolute; width: 3px; height: 100%; top: 0; border-radius: 3px;
        }
        .tab-add-btn::before { left: -4px; background: var(--primary-color); }
        .tab-add-btn::after { right: -4px; background: var(--secondary-accent); }
        .tab-add-btn i { color: #fff; font-size: 18px; font-weight: bold; position: relative; z-index: 2; }
        
        /* 进度条 */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.15);
            z-index: 4;
            overflow: hidden;
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-accent)); 
            width: 0%; 
            transition: width 0.1s linear; 
            border-radius: 2px;
        }
        
        /* 模态框样式 */
        .settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(8px);
        }
        .settings-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #1a1a1a;
            padding: 25px; border-radius: 16px; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .source-select-container { margin-bottom: 20px; }
        .source-select {
            width: 100%; padding: 14px; background: #2a2a2a;
            border: 1px solid #444; border-radius: 10px;
            color: var(--text-white); font-size: 14px; outline: none;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .source-select:focus { border-color: var(--primary-color); }
        .source-select option { background: #2a2a2a; color: var(--text-white); padding: 10px; }
        .btn-action {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
            transition: all 0.3s;
        }
        .btn-confirm { background: linear-gradient(135deg, var(--primary-color), var(--primary-accent)); color: white; }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(57, 215, 228, 0.45); }
        .btn-upload { background: #333; color: white; }
        .btn-upload:hover { background: #3d3d3d; }
        .btn-close {
            background: transparent; color: rgba(255,255,255,0.6); padding: 10px 30px;
            border-radius: 20px; font-size: 14px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .btn-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        /* Toast & Loading */
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 2000; display: none;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .loading-spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 62px; height: 62px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary-color);
            border-right-color: var(--secondary-accent);
            animation: spin 1.05s linear infinite;
            z-index: 18;
            box-shadow: 0 0 20px rgba(57, 215, 228, 0.35);
            display: none;
        }
        .loading-spinner::before {
            content: '♪';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #cfffff;
            text-shadow: 0 0 10px var(--miku-glow);
        }
        .loading .loading-spinner { display: block; }
        
        /* 错误重试界面 */
        .error-overlay {

            const cardHeight = videoFeed.querySelector('.video-card')?.offsetHeight || window.innerHeight;
            const cards = videoFeed.querySelectorAll('.video-card');
            if (!cards.length || !cardHeight) return;

            const currentIndex = Math.round(videoFeed.scrollTop / cardHeight);
            const targetIndex = Math.max(0, Math.min(cards.length - 1, currentIndex + step));
            if (targetIndex === currentIndex) return;

            scrollSwitchLocked = true;
            videoFeed.scrollTo({
                top: targetIndex * cardHeight,
                behavior: 'smooth'
            });

            setTimeout(() => {
                scrollSwitchLocked = false;
            }, 360);

            wheelDeltaBuffer += e.deltaY;

            if (Math.abs(wheelDeltaBuffer) < 35) return;
            const step = wheelDeltaBuffer > 0 ? 1 : -1;
            wheelDeltaBuffer = 0;
            scrollToCardStep(step);
        }, { passive: false });

                scrollToCardStep(e.code === 'ArrowDown' ? 1 : -1);

    function initVideoObserver() {
        if (observer) observer.disconnect();
        
        const options = {
            root: document.querySelector('.video-feed'),
            threshold: 0.6 // 降低阈值，确保更容易触发播放
        };
        
        observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const card = entry.target;
                const video = card.querySelector('video');
                
                if (entry.isIntersecting) {
                    // 进入视野
                    handleCardActive(card, video);
                    // 检查无限加载
                    handleScrollLoading(card);
                } else {
                    // 离开视野
                    handleCardInactive(card, video);
                }
            });
        }, options);
        
        document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
    }

                .catch(err => {
                    console.warn("Autoplay blocked, trying muted...", err);
                    // 如果有声播放失败，回退到静音播放
                    video.muted = true;
                    video.play().then(() => {
                        card.classList.remove('loading');
                        card.classList.remove('paused');
                        card.classList.add('playing');
                        card.querySelector('.unmute-hint').classList.add('show');
                        const disc = card.querySelector('.disc-area');
                        if(disc) disc.classList.remove('paused');
                    }).catch(e => {
                        console.error("Playback completely failed", e);
                        card.classList.remove('loading');
                        card.classList.add('paused');
                    });
                });
            }
        } catch (e) {
            console.error(e);
        }
    }

    function handleCardInactive(card, video) {
        video.pause();
        video.currentTime = 0;
        card.classList.add('paused');
        const disc = card.querySelector('.disc-area');
        if(disc) disc.classList.add('paused');
        card.querySelector('.unmute-hint').classList.remove('show');
    }

    // 处理无限加载和简单的内存管理
    function handleScrollLoading(currentCard) {
        const allCards = Array.from(document.querySelectorAll('.video-card'));
        const currentIndex = allCards.indexOf(currentCard);

        // 加载更多
        if (!isStaticSource && currentApiUrl && currentIndex >= allCards.length - PRELOAD_OFFSET) {
            appendVideosToFeed(2);
        }
        
        // 内存优化：保留当前及前后各2个，其他移除src
        allCards.forEach((card, index) => {
            const vid = card.querySelector('video');
            if (Math.abs(index - currentIndex) > 3) {
                if (vid.getAttribute('src')) {
                    vid.removeAttribute('src');
                    vid.load(); // 释放内存
                }
            } else {
                // 预加载附近的
                if (!vid.getAttribute('src') && card.dataset.src) {
                    vid.src = card.dataset.src;
                }
            }
        });
    }

    // ---------------- 事件处理 ----------------

    function initAllVideoEvents() {
        document.querySelectorAll('.video-card').forEach(card => {
            if(card.dataset.eventsBound) return;
            
            const video = card.querySelector('video');
            
            // 记录原始 URL
            if(video.getAttribute('src') && !card.dataset.src) {
                card.dataset.src = video.getAttribute('src');
            }

            // 加载开始
            video.addEventListener('loadstart', () => {
                card.classList.add('loading');
                card.querySelector('.error-overlay').classList.remove('show');
            });
            
            // 可以播放
            video.addEventListener('canplay', () => {
                card.classList.remove('loading');
            });
            
            // 播放进度
            video.addEventListener('timeupdate', updateProgress);
            
            // 等待数据
            video.addEventListener('waiting', () => {
                card.classList.add('loading');
            });
            
            // 正在播放
            video.addEventListener('playing', () => {
                card.classList.remove('loading');
                card.querySelector('.error-overlay').classList.remove('show');
            });

            // 错误处理
            video.addEventListener('error', (e) => {
                handleVideoError(card, video);
            });
            
            // 点击事件
            let lastClickTime = 0;
            card.addEventListener('click', (e) => {
                if(e.target.closest('.sidebar') || e.target.closest('.bottom-tabs') || e.target.closest('.top-nav') || e.target.closest('.error-overlay')) return;
                
                // 记录用户交互，之后可以有声播放
                hasUserInteracted = true;
                
                const currentTime = new Date().getTime();
                if (currentTime - lastClickTime < 300) {
                    showHeartAnimation(e.clientX, e.clientY, card);
                    likeVideo(card);
                } else {
                    togglePlay(video, card);
                }
                lastClickTime = currentTime;
            });
            
            card.dataset.eventsBound = "true";
        });
    }

    function handleVideoError(card, video) {
        card.classList.remove('loading');
        
        let retryCount = parseInt(card.dataset.retries || '0');
        if (retryCount < 3) {
            console.log(`Retrying video... attempt ${retryCount + 1}`);
            card.dataset.retries = retryCount + 1;
            setTimeout(() => {
                if(card.dataset.src) {
                    // 尝试加时间戳刷新
                    const newUrl = getFreshUrl(card.dataset.src.split('?')[0]); 
                    video.src = newUrl;
                    video.load();
                }
            }, 1000);
        } else {
            // 显示重试按钮
            card.querySelector('.error-overlay').classList.add('show');
        }
    }

    // 手动重试按钮
    window.retryLoad = function(btn) {
        const card = btn.closest('.video-card');
        const video = card.querySelector('video');
        card.dataset.retries = '0'; // 重置重试计数
        card.querySelector('.error-overlay').classList.remove('show');
        card.classList.add('loading');
        
        // 尝试重新获取源
        if (isStaticSource) {
            video.load();
        } else {
            const newUrl = getFreshUrl(currentApiUrl);
            video.src = newUrl;
            card.dataset.src = newUrl;
            video.load();
            video.play().catch(e => console.error(e));
        }
    }

    function togglePlay(video, card) {
        const disc = card.querySelector('.disc-area');
        
        // 如果之前是静音的，点击时取消静音
        if (video.muted) {
            video.muted = false;
            card.querySelector('.unmute-hint').classList.remove('show');
            // 如果之前是暂停的，现在播放
            if (video.paused) {
                video.play();
                card.classList.remove('paused');
                if(disc) disc.classList.remove('paused');
            }
            return;
        }

        if (video.paused) {
            video.play();
            card.classList.remove('paused');
            if(disc) disc.classList.remove('paused');
        } else {
            video.pause();
            card.classList.add('paused');
            if(disc) disc.classList.add('paused');
        }
    }

    function updateProgress(e) {
        const video = e.target;
        if(video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            const bar = video.parentElement.querySelector('.progress-bar');
            if(bar) bar.style.width = `${percent}%`;
        }
    }

    // ---------------- UI 辅助函数 ----------------

    async function appendSingleVideo(url, author, title) {
        const feed = document.getElementById('videoFeed');
        const avatarUrl = await getVerifiedAvatarUrl();
        const html = generateVideoHTML({
            url: url, title: title, author: author,
            avatar: avatarUrl
        });
        feed.insertAdjacentHTML('beforeend', html);
        initVideoObserver();
        initAllVideoEvents();
    }

    let lastTapTime = 0;
    let tapTimeout = null;

    window.toggleLike = function(element, event) {
        if (event) event.stopPropagation();
        const card = element.closest('.video-card');
        const icon = element.querySelector('i');
        
        if (icon.classList.contains('liked')) {
            icon.classList.remove('liked');
            icon.classList.remove('bi-heart-fill');
            icon.classList.add('bi-heart');
            if (card) removeLikedVideo(card.dataset.videoId);
        } else {
            icon.classList.add('liked');
            icon.classList.remove('bi-heart');
            icon.classList.add('bi-heart-fill');
            if (card) saveLikedVideo(card);
        }
    }

    function likeVideo(card) {
        const likeBtn = card.querySelector('.action-item i.bi-heart, .action-item i.bi-heart-fill');
        if (likeBtn && !likeBtn.classList.contains('liked')) {
            likeBtn.classList.add('liked');
            likeBtn.classList.remove('bi-heart');
            likeBtn.classList.add('bi-heart-fill');
            saveLikedVideo(card);
        }
    }

    function showHeartAnimation(x, y, container) {
        const heart = document.createElement('i');
        heart.className = 'bi bi-heart-fill double-tap-heart';
        container.appendChild(heart);
        setTimeout(() => heart.remove(), 800);
    }

    function getLikedVideos() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY_LIKES);
            return stored ? JSON.parse(stored) : [];
        } catch (e) {
            console.error('Error reading liked videos:', e);
            return [];
        }
    }

    function saveLikedVideo(card) {
        const videoId = card.dataset.videoId;
        if (!videoId) return;
        
        try {
            const videos = getLikedVideos();
            if (videos.find(v => v.id === videoId)) return;
            
            const newVideo = {
                id: videoId,
                url: card.dataset.videoUrl,
                author: card.dataset.author,
                desc: card.dataset.desc,
                avatar: card.dataset.avatar,
                timestamp: Date.now(),
                likesCount: Math.floor(Math.random() * 10000) + 100
            };
            
            videos.unshift(newVideo);
            localStorage.setItem(STORAGE_KEY_LIKES, JSON.stringify(videos));
            updateLikedCount();
            showToast('已添加到我的喜欢');
        } catch (e) {
            console.error('Error saving liked video:', e);
            showToast('保存失败');
        }
    }

    function removeLikedVideo(videoId) {
        try {
            const videos = getLikedVideos();
            const filtered = videos.filter(v => v.id !== videoId);
            localStorage.setItem(STORAGE_KEY_LIKES, JSON.stringify(filtered));
            updateLikedCount();
            renderLikedGrid();
            showToast('已从我的喜欢中移除');
        } catch (e) {
            console.error('Error removing liked video:', e);
            showToast('删除失败');
        }
    }

    function isVideoLiked(videoId) {
        const videos = getLikedVideos();
        return videos.some(v => v.id === videoId);
    }

    function updateLikedCount() {
        const countEl = document.getElementById('likedCount');
        if (countEl) {
            countEl.textContent = getLikedVideos().length;
        }
    }

    function renderLikedGrid() {
        const grid = document.getElementById('likedVideosGrid');
        const emptyState = document.getElementById('noLikedContent');
        const videos = getLikedVideos();
        
        if (videos.length === 0) {
            grid.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }
        
        emptyState.style.display = 'none';
        grid.innerHTML = videos.map(v => `
            <div class="video-grid-item" onclick="playLikedVideo('${v.id}')">
                <video src="${v.url}" muted preload="metadata" loop></video>
                <div class="delete-btn" onclick="event.stopPropagation(); removeLikedById('${v.id}')">
                    <i class="bi bi-x-lg" style="color: #fff; font-size: 14px;"></i>
                </div>
                <div class="likes-count">
                    <i class="bi bi-heart-fill"></i>
                    ${formatNumber(v.likesCount || 1000)}
                </div>
            </div>
        `).join('');
    }

    function formatNumber(num) {
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + 'w';
        }
        return num.toString();
    }

    function removeLikedById(videoId) {
        removeLikedVideo(videoId);
        renderLikedGrid();
    }

    function playLikedVideo(videoId) {
        const videos = getLikedVideos();
        const video = videos.find(v => v.id === videoId);
        if (video) {
            showHomeTab();
            const feed = document.getElementById('videoFeed');
            const avatarUrl = video.avatar || 'https://i.pravatar.cc/100?img=1';
            const html = generateVideoHTML({
                url: video.url,
                title: video.desc,
                author: video.author,
                avatar: avatarUrl
            });
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const newCard = tempDiv.firstElementChild;
            newCard.dataset.videoId = videoId;
            
            feed.insertBefore(newCard, feed.firstChild);
            feed.scrollTop = 0;
            
            setTimeout(() => {
                initVideoObserver();
                initAllVideoEvents();
            }, 100);
        }
    }

    function showProfileTab() {
        document.getElementById('videoFeed').style.display = 'none';
        document.getElementById('profilePage').classList.add('show');
        document.querySelector('.bottom-tabs .tab-item.active')?.classList.remove('active');
        document.querySelector('.bottom-tabs .tab-item:last-child').classList.add('active');
        updateLikedCount();
        renderLikedGrid();
    }

    function showHomeTab() {
        document.getElementById('profilePage').classList.remove('show');
        document.getElementById('videoFeed').style.display = 'block';
        document.querySelector('.bottom-tabs .tab-item.active')?.classList.remove('active');
        document.querySelector('.bottom-tabs .tab-item:first-child').classList.add('active');
    }

    function showLikedTab() {
        const tabs = document.querySelectorAll('.profile-tab');
        tabs.forEach(t => t.classList.remove('active'));
        tabs[2].classList.add('active');
        renderLikedGrid();
    }

    window.openCommentPopup = function(element) {
        showToast('评论功能开发中...');
    }

    function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const jsonContent = JSON.parse(e.target.result);
                processImportedData(jsonContent);
                closeSettings();
                showToast('JSON导入成功');
            } catch (err) { alert('JSON格式错误'); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function processImportedData(data) {
        let list = Array.isArray(data) ? data : (data.list || data.data || []);
        if (list.length === 0) return alert("无有效数据");
        isStaticSource = true;
        currentApiUrl = ""; 
        const feed = document.getElementById('videoFeed');
        feed.innerHTML = '';
        list.forEach(item => {
             let url = item.url || item.video || item.src;
             if(url) appendSingleVideo(url, item.author || '本地导入', item.title || '导入视频');
        });
    }

    function openSettings() { document.getElementById('settingsModal').classList.add('show'); }
    function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }
</script>
